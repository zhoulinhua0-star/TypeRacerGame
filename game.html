<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrecisionTyper - Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header style="margin-bottom: 20px;">
            <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-weight: bold;">← ESCAPE</a>
        </header>

        <div class="top-panel">
            <div style="display:flex; gap:20px;">
                <select id="difficulty-select" class="difficulty-select" style="background:var(--bg-main); color:var(--text-main); border:1px solid var(--border); padding:5px; border-radius:5px;">
                    <option value="0">EASY</option>
                    <option value="1" selected>MEDIUM</option>
                    <option value="2">HARD</option>
                </select>
                <label class="checkbox-label"><input type="checkbox" id="theme-toggle"> LIGHT MODE</label>
            </div>
            
            <div style="display:flex; gap:30px;">
                <div class="stat-card"><div class="stat-value" id="timer-label">0s</div></div>
                <div class="stat-card"><div class="stat-value" id="wpm-label">0</div></div>
                <div class="stat-card"><div class="stat-value" id="accuracy-label">100%</div></div>
            </div>
        </div>

        <div class="center-panel">
            <div id="text-display" class="text-display"></div>
            <textarea id="input-area" class="input-area" placeholder="Type the text above..." spellcheck="false"></textarea>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
