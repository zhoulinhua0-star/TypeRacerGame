<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrecisionTyper | Master Your Craft</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .hero-section {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero-title {
            font-size: 5rem; /* 更大 */
            font-weight: 900; /* 更粗 */
            color: var(--fg-color);
            margin-bottom: 10px;
            background: linear-gradient(to bottom, var(--fg-color), var(--stat-text-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--fg-color); /* 字体颜色加深 */
            opacity: 0.9;
            margin-bottom: 50px;
            letter-spacing: 0.5px;
        }
        .play-btn {
            background: var(--stat-text-color);
            color: #000; /* 亮色文字在深色背景按钮上对比度更高 */
            padding: 22px 60px;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 100px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(87, 199, 255, 0.3);
        }
        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 30px 60px rgba(87, 199, 255, 0.5);
        }
        .home-controls {
            position: fixed;
            bottom: 30px;
            display: flex;
            gap: 20px;
            background: var(--accent-color);
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero-section">
            <h1 class="hero-title">PRECISION TYPER</h1>
            <p class="hero-subtitle">Rigorous speed training. Zero-tolerance accuracy.</p>
            <a href="game.html" class="play-btn">LAUNCH GAME</a>
        </section>
    </div>

    <div class="home-controls">
        <label class="checkbox-label">
            <input type="checkbox" id="theme-toggle">
            <span style="color: var(--fg-color);">Switch Light Mode</span>
        </label>
    </div>

    <script src="script.js"></script>
</body>
</html>
