<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrecisionTyper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PrecisionTyper</h1>
        <div class="settings">
            <label for="difficulty-select">Difficulty:</label>
            <select id="difficulty-select">
                <option value="0">Easy</option>
                <option value="1">Medium</option>
                <option value="2">Hard</option>
            </select>

            <label for="sound-toggle">Sound:</label>
            <input type="checkbox" id="sound-toggle" checked>

            <button id="theme-toggle">Toggle Light/Dark</button>
        </div>

        <div id="text-display" class="text-display"></div>
        <textarea id="input-area" placeholder="Start typing here..."></textarea>

        <div class="stats">
            <span id="timer-label">Time: 0s</span>
            <span id="wpm-label">WPM: 0</span>
            <span id="accuracy-label">Accuracy: 100%</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
