<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrecisionTyper | Hub</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero h1 {
            font-size: 6rem;
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 20px;
            letter-spacing: -3px;
        }
        .hero p {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 500;
        }
        .btn-launch {
            background: var(--text-main);
            color: var(--bg-main);
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 100px;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .btn-launch:hover {
            transform: scale(1.05);
        }
        .theme-switch-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>TYPE<br><span style="color:var(--accent)">FAST.</span></h1>
            <p>The elite trainer for speed and precision.</p>
            <a href="game.html" class="btn-launch">ENTER ARENA</a>
        </div>
    </div>

    <div class="theme-switch-container">
        <label class="checkbox-label">
            <input type="checkbox" id="theme-toggle">
            <span>LIGHT MODE</span>
        </label>
    </div>
    <script src="script.js"></script>
</body>
</html>
